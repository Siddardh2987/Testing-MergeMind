<!doctype html>
<html lang="en">
<head>
	<meta charset="utf-8">
	<meta name="viewport" content="width=device-width, initial-scale=1">
	<title>Basic Neon Hello</title>
	<style>
		:root{
			--bg:#0b0f12;
			--neon-cyan:#00f5ff;
			--neon-pink:#ff2d95;
			--glass: rgba(255,255,255,0.03);
		}
		html,body{height:100%;}
		body{
			margin:0;
			font-family: Inter, ui-sans-serif, system-ui, -apple-system, "Segoe UI", Roboto, "Helvetica Neue", Arial;
			background: radial-gradient(1200px 600px at 10% 10%, rgba(0,245,255,0.06), transparent),
									radial-gradient(900px 400px at 90% 90%, rgba(255,45,149,0.05), transparent),
									var(--bg);
			color:#e6f7ff;
			display:flex;
			align-items:center;
			justify-content:center;
			-webkit-font-smoothing:antialiased;
			-moz-osx-font-smoothing:grayscale;
		}
		.card{
			background: linear-gradient(180deg, rgba(255,255,255,0.02), rgba(255,255,255,0.01));
			border: 1px solid rgba(0,255,255,0.06);
			padding:48px 64px;
			border-radius:12px;
			box-shadow: 0 8px 40px rgba(2,6,23,0.6), 0 0 40px rgba(0,245,255,0.03) inset;
			text-align:center;
			backdrop-filter: blur(6px) saturate(120%);
		}
		h1{
			margin:0 0 8px 0;
			font-size:48px;
			letter-spacing:1px;
			text-shadow: 0 2px 8px rgba(0,0,0,0.6), 0 0 12px rgba(0,245,255,0.12);
			color: var(--neon-cyan);
		}
		p{
			margin:0;
			color: #bfefff;
			text-shadow: 0 1px 0 rgba(0,0,0,0.5);
		}
		.neon-line{
			height:4px;
			width:100%;
			margin:18px 0 26px 0;
			background: linear-gradient(90deg, rgba(0,245,255,0.0), var(--neon-cyan), var(--neon-pink), rgba(255,45,149,0.0));
			filter: blur(6px) saturate(150%);
			border-radius:999px;
		}
		footer{margin-top:12px;font-size:13px;color:#8fbecf}
		@media (max-width:480px){
			.card{padding28px 20px}
		
<body
